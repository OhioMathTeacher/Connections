<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections Builder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <h1><a href="#/">Connections</a></h1>
  <nav>
    <a href="#/">Play</a>
    <a href="#/build">Build</a>
    <a href="#/review">Review</a>
    <a href="#/about">About</a>
  </nav>
</header>

<main id="app"></main>

<template id="view-home">
  <section class="home">
    <h2>Pick a puzzle</h2>
    <div class="filters">
      <label>Language <select id="filter-lang"></select></label>
      <label>Subject <select id="filter-subject"></select></label>
      <label>Grade <select id="filter-grade"></select></label>
    </div>
    <ul id="puzzle-list" class="puzzle-list">
      <li class="loading">Loading puzzles…</li>
    </ul>
    <p class="cta">Want to make your own? <a href="#/build">Build a puzzle →</a></p>
  </section>
</template>

<template id="view-play">
  <section class="play">
    <header class="play-header">
      <h2 id="play-title"></h2>
      <p id="play-author" class="muted"></p>
    </header>

    <div id="solved" class="solved"></div>
    <div id="grid" class="grid"></div>

    <div class="controls">
      <div class="mistakes">Mistakes: <span id="mistakes-dots"></span></div>
      <div class="buttons">
        <button id="btn-shuffle" type="button">Shuffle</button>
        <button id="btn-deselect" type="button">Deselect</button>
        <button id="btn-submit" type="button" class="primary" disabled>Submit</button>
      </div>
    </div>

    <div id="message" class="message" aria-live="polite"></div>
  </section>
</template>

<template id="view-build">
  <section class="build">
    <h2>Build a puzzle</h2>
    <p class="muted">Four groups, four words each. Color = difficulty (yellow easiest, purple hardest).</p>

    <form id="build-form">
      <label>Title <input name="title" required maxlength="80" placeholder="My Awesome Puzzle"></label>
      <label>Author <input name="author" maxlength="40" placeholder="Your name (optional)"></label>

      <div class="meta-row">
        <label>Language <select name="language" required></select></label>
        <label>Subject <select name="subject" required></select></label>
        <label>Grade level <select name="grade" required></select></label>
      </div>

      <div class="groups">
        <div class="group g-yellow">
          <label>Yellow category <input name="cat0" required maxlength="60"></label>
          <div class="words"><input name="w0_0" required maxlength="20"><input name="w0_1" required maxlength="20"><input name="w0_2" required maxlength="20"><input name="w0_3" required maxlength="20"></div>
        </div>
        <div class="group g-green">
          <label>Green category <input name="cat1" required maxlength="60"></label>
          <div class="words"><input name="w1_0" required maxlength="20"><input name="w1_1" required maxlength="20"><input name="w1_2" required maxlength="20"><input name="w1_3" required maxlength="20"></div>
        </div>
        <div class="group g-blue">
          <label>Blue category <input name="cat2" required maxlength="60"></label>
          <div class="words"><input name="w2_0" required maxlength="20"><input name="w2_1" required maxlength="20"><input name="w2_2" required maxlength="20"><input name="w2_3" required maxlength="20"></div>
        </div>
        <div class="group g-purple">
          <label>Purple category <input name="cat3" required maxlength="60"></label>
          <div class="words"><input name="w3_0" required maxlength="20"><input name="w3_1" required maxlength="20"><input name="w3_2" required maxlength="20"><input name="w3_3" required maxlength="20"></div>
        </div>
      </div>

      <div class="buttons">
        <button type="button" id="btn-preview">Preview / Test</button>
        <button type="button" id="btn-share-link" class="primary">Get share link</button>
        <button type="button" id="btn-submit-repo" class="primary">Submit to repo</button>
      </div>
    </form>

    <div id="build-output" class="build-output"></div>
  </section>
</template>

<template id="view-review">
  <section class="review">
    <h2>Review queue</h2>
    <p class="muted">Open puzzle submissions. Click a PR to test-play it before merging — keeps the turds out. 🚽</p>
    <ul id="review-list" class="puzzle-list">
      <li class="loading">Loading…</li>
    </ul>
  </section>
</template>

<template id="view-about">
  <section class="about">
    <h2>About</h2>
    <p>This is a fan-made Connections-style puzzle builder. Players try to find four groups of four words that share a hidden theme — yellow is easiest, purple is hardest. You get four mistakes before the game ends.</p>
    <p>Anyone can build a puzzle and submit it to the repo. Submissions open a pre-filled GitHub commit page, which creates a pull request. A maintainer reviews it on the <a href="#/review">Review page</a> (test-play it first!) and merges. Once merged, it appears on the Play list automatically.</p>
    <p>Source: <a id="repo-link" href="#">GitHub</a></p>
  </section>
</template>

<script src="app.js"></script>
</body>
</html>
